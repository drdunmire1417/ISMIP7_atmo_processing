[Regridding]
# Target Ice Sheet (AIS or GrIS)
icesheet = AIS
#Target resolution (m) AIS = 2000, GrIS = 1000
target_res = 2000
# Paths to geometry and weights
weights_dir = weights/
masks_dir = masks/
num_workers = 24
regrid_scheme = conservative

[Source]
# Source information
src_dir = /projects/grid/ghub/ISMIP7/prep/AIS/CESM2-WACCM/ssp585/SDBN1_raw/v1/
gcm = CESM2-WACCM
scenario = ssp585
method = SDBN1

[Output]
# Output information
output_dir = /projects/grid/ghub/ISMIP6/devon/ISMIP7_atmo_processing/OUTPUT/
scratch_dir = /vscratch/grp-ghub/devon-temp/temp/
var_list = acabf, mrro, pr, snowf, snm, tas
version = 1

[Gradients]
gradients_var_list = acabf, mrro, tas, ts

[Cases]
#booleans to compute gradients, climatology, and anomalies
#yes or no to regrid the output files
normal = no
#yes or no to regrid the gradient files
gradients = no




